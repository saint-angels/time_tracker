name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: swift build -c release

      - name: Bundle app
        run: bash bundle.sh

      - name: Zip app
        run: zip -r Cycle-${{ steps.version.outputs.version }}.zip Cycle.app

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Cycle ${{ steps.version.outputs.version }}
          files: Cycle-${{ steps.version.outputs.version }}.zip
          make_latest: true
