name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Bundle app
        run: bash bundle.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cycle.app
          path: Cycle.app
